<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Investigation Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #004085;
            --light-bg: #f4f7f6;
            --dark-text: #333;
            --light-text: #fff;
            --accent-color: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: var(--light-text);
            padding: 1.5em 0;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2em;
        }

        nav {
            background-color: var(--secondary-color);
            padding: 0.8em 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2em;
        }

        nav ul li a {
            color: var(--light-text);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: var(--accent-color);
        }

        /* Main content wrapper */
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        footer {
            background-color: var(--secondary-color);
            color: var(--light-text);
            text-align: center;
            padding: 1em 0;
            box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5em;
            }

            nav ul {
                flex-wrap: wrap;
                gap: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Forensic Investigation of Malicious Activities in Digital Environments</h1>
    </header>

    <nav>
        <ul>
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'UserLogin' %}">Users</a></li>
            <li><a href="{% url 'AdminLogin' %}">Admin</a></li>
            <li><a href="{% url 'UserRegister' %}">Registration</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <div class="page-wrapper">
        {% block contents %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2025 Digital Forensics Report. All rights reserved.</p>
    </footer>

    <script>
        document.querySelectorAll('nav ul li a').forEach(link => {
            link.addEventListener('click', function() {
                document.querySelectorAll('nav ul li a').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
